name: Issue maintenance

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close-stale-needs-info:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale issues still missing a link
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();
            const staleMs = 7 * 24 * 60 * 60 * 1000;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'needs-info',
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const updatedAt = new Date(issue.updated_at).getTime();
              const title = issue.title || '';
              const body = issue.body || '';
              const hasUrl = /(https?:\/\/\S+)|(github\.com\/\S+)/i.test(title) || /(https?:\/\/\S+)|(github\.com\/\S+)/i.test(body);

              if (hasUrl) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name: 'needs-info',
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
                continue;
              }

              if (now - updatedAt < staleMs) continue;

              const labels = (issue.labels || []).map(l => l.name);
              if (!labels.includes('rejected')) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: ['rejected'],
                });
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  'Closing this for now because we still do not have the resource link.',
                  '',
                  'Feel free to reopen with the link anytime and it can go back into triage.',
                ].join('\n'),
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
