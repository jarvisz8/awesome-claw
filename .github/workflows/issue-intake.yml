name: Issue intake

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  label-and-acknowledge-resource-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Label likely resource submissions and manage needs-info
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const action = context.payload.action;

            const title = issue.title || '';
            const body = issue.body || '';
            const titleLower = title.toLowerCase();
            const labels = (issue.labels || []).map(l => l.name);

            const hasUrl = /(https?:\/\/\S+)|(github\.com\/\S+)/i.test(title) || /(https?:\/\/\S+)|(github\.com\/\S+)/i.test(body);
            const looksLikeResource = titleLower.includes('[resource]') || titleLower.includes('resource') || titleLower.includes('add') || titleLower.includes('suggest') || hasUrl;

            const toAdd = [];
            const toRemove = [];

            if (looksLikeResource && !labels.includes('addition')) toAdd.push('addition');
            if (!labels.includes('triage')) toAdd.push('triage');

            if (looksLikeResource && !hasUrl && !labels.includes('needs-info')) {
              toAdd.push('needs-info');
            }

            if (hasUrl && labels.includes('needs-info')) {
              toRemove.push('needs-info');
            }

            if (toAdd.length) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [...new Set(toAdd)],
              });
            }

            for (const name of [...new Set(toRemove)]) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const hasBotComment = (needle) => comments.some(comment =>
              comment.user?.type === 'Bot' &&
              (comment.body || '').includes(needle)
            );

            if (action === 'opened' && looksLikeResource && hasUrl && !hasBotComment('Thanks — link received.')) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  'Thanks — link received.',
                  '',
                  'This repo uses low-friction intake on purpose.',
                  'No need to pre-format the entry or figure out the exact category.',
                  'We\'ll review it and handle wording/taxonomy during triage.',
                ].join('\n'),
              });
            }

            if (looksLikeResource && !hasUrl && !hasBotComment('Please add the resource link')) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  'Thanks — this intake is intentionally lightweight.',
                  '',
                  'Please add the resource link in the issue body or title and we can take it from there.',
                  'Once the link is there, the `needs-info` label will clear automatically.',
                ].join('\n'),
              });
            }

            if (hasUrl && hasBotComment('Please add the resource link')) {
              if (!hasBotComment('Link received — thanks.')) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: 'Link received — thanks. This is back in triage.'
                });
              }
            }
