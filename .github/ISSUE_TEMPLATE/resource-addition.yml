name: Resource addition
description: Suggest a resource to add to awesome-claw
title: "[Resource]: "
labels:
  - addition
body:
  - type: markdown
    attributes:
      value: |
        Keep it simple.

        Just drop the link.
        We can sort out the description, category, and wording during review.

  - type: input
    id: url
    attributes:
      label: Resource URL
      placeholder: https://github.com/builderz-labs/mission-control
    validations:
      required: true
